# Static site publish root = this folder (ust-holdings-site/)
[build]
  publish = "."
  # No build step — HTML is pre-generated by local pipeline scripts.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[redirects]]
  from = "/us-treasuries"
  to = "/us-treasuries/"
  status = 301

[[redirects]]
  from = "/m2-stablecoins"
  to = "/m2-stablecoins/"
  status = 301
